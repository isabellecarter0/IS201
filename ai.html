<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Don't Hit the Walls!!!</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial;
        text-align: center;
        background: #4facfe;
    }

    h1 {
        margin: 1px 0 0 0;
        color: white;
    }

    canvas {
        display: block;
        margin: 0 auto;
        background: linear-gradient(to bottom, #4facfe, #00c6ff);
    }

    #ui {
        position: absolute;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
    }

    button {
        padding: 10px 20px;
        margin-top: 10px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: #333;
        color: white;
        cursor: pointer;
    }

    #gameOver {
        display: none;
        font-size: 24px;
        margin-top: 10px;
    }
</style>
</head>
<body>
 
<a href="index.html">Home</a><h1>Don't Hit the Walls!!!</h1>

<div id="ui">
    <div id="score">Score: 0</div>
    <button id="startBtn">Start Game</button>
    <div id="gameOver">Game Over</div>
    <button id="restartBtn" style="display:none;">Play Again</button>
</div>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let bird, obstacles, score, gameRunning, frame;
let gravity = 0.5;
let lift = -8;
let speed = 2;
let spawnRate = 120;

// Reset game
function resetGame() {
    bird = {
        x: 100,
        y: 200,
        width: 30,
        height: 30,
        velocity: 0
    };

    obstacles = [];
    score = 0;
    frame = 0;
    speed = 2;
    spawnRate = 120;
    gameRunning = true;

    document.getElementById("score").innerText = "Score: 0";
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
}

// Controls
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") {
        bird.velocity = lift;
    }
});

// Buttons
document.getElementById("startBtn").onclick = () => {
    resetGame();
    document.getElementById("startBtn").style.display = "none";
    gameLoop();
};

document.getElementById("restartBtn").onclick = () => {
    resetGame();
    gameLoop();
};

// Spawn obstacle
function spawnObstacle() {
    let gap = 150;
    let topHeight = Math.random() * (canvas.height - gap - 50);

    obstacles.push({
        x: canvas.width,
        width: 50,
        top: topHeight,
        bottom: canvas.height - (topHeight + gap),
        passed: false
    });
}

// Collision check
function isColliding(a, b) {
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

// Update game
function update() {
    frame++;

    if (score > 0 && score % 200 === 0) {
        speed += 0.2;
        spawnRate = Math.max(80, spawnRate - 5);
    }

    bird.velocity += gravity;
    bird.y += bird.velocity;

    let ground = canvas.height - 30;
    if (bird.y + bird.height > ground) {
        bird.y = ground - bird.height;
        bird.velocity = 0;
    }

    if (bird.y < 0) bird.y = 0;

    for (let obs of obstacles) {
        obs.x -= speed;

        let topRect = {
            x: obs.x,
            y: 0,
            width: obs.width,
            height: obs.top
        };

        let bottomRect = {
            x: obs.x,
            y: canvas.height - obs.bottom,
            width: obs.width,
            height: obs.bottom - 30
        };

        if (isColliding(bird, topRect) || isColliding(bird, bottomRect)) {
            endGame();
        }

        if (!obs.passed && obs.x + obs.width < bird.x) {
            score += 20;
            obs.passed = true;
        }
    }

    obstacles = obstacles.filter(o => o.x + o.width > 0);

    if (frame % spawnRate === 0) spawnObstacle();

    document.getElementById("score").innerText = "Score: " + score;
}

// Draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#6ab04c";
    ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(bird.x + 15, bird.y + 15, 15, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    for (let obs of obstacles) {
        ctx.fillRect(obs.x, 0, obs.width, obs.top);
        ctx.fillRect(obs.x, canvas.height - obs.bottom, obs.width, obs.bottom - 30);
    }
}

// Loop
function gameLoop() {
    if (!gameRunning) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// End game
function endGame() {
    gameRunning = false;
    document.getElementById("gameOver").style.display = "block";
    document.getElementById("restartBtn").style.display = "inline-block";
}
</script>

</body>
</html>
